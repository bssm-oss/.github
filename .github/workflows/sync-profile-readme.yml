name: Sync org profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"
  push:
    branches:
      - main
    paths:
      - scripts/generate_profile_readme.py
      - .github/workflows/sync-profile-readme.yml

permissions:
  contents: write

jobs:
  sync-profile-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate profile README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_profile_readme.py

      - name: Commit changes if needed
        run: |
          if git diff --quiet -- profile/README.md; then
            echo "No README changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git commit -m "Sync profile README"
          git push
